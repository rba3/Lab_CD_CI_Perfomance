name: Performance PokeAPI (JMeter)

# Se dispara de forma AUTOMATICA (cron diario) y tambien MANUAL (workflow_dispatch)
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Escenario a ejecutar"
        type: choice
        options: [both, smoke, load]
        default: both
      threads:
        description: "Usuarios concurrentes (vacio = default del plan)"
        required: false
        default: ""
      rampup:
        description: "Ramp-up en segundos (vacio = default)"
        required: false
        default: ""
      duration:
        description: "Duracion en segundos (vacio = default)"
        required: false
        default: ""
      think:
        description: "Think time en ms (vacio = default)"
        required: false
        default: ""
      simular_fallo:
        description: "Simular un veredicto para demostrar el cierre de ciclo (abre issue)"
        type: choice
        options: [no, WARN, FAIL]
        default: "no"
  schedule:
    # Todos los dias 13:00 UTC (~07:00 CDMX)
    - cron: "0 13 * * *"
  # Validacion de performance en cada Pull Request hacia main (solo smoke, rapido)
  pull_request:
    branches: [main]

permissions:
  contents: write   # commitear el reporte generado
  models: read      # usar el agente de IA (GitHub Models)
  issues: write     # abrir un issue cuando el performance degrada (WARN/FAIL)

concurrency:
  group: perf-pokeapi
  cancel-in-progress: false

jobs:
  perf:
    runs-on: ubuntu-latest
    env:
      JMETER_VERSION: "5.6.3"
      # En un PR corremos solo smoke (validacion rapida); manual/cron usan 'both' o lo elegido
      SCENARIO: ${{ github.event.inputs.scenario || (github.event_name == 'pull_request' && 'smoke') || 'both' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: apache-jmeter-5.6.3
          key: jmeter-5.6.3

      - name: Instalar JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz"
          tar -xzf "apache-jmeter-${JMETER_VERSION}.tgz"

      - name: Registrar JMeter en PATH
        run: echo "$PWD/apache-jmeter-${JMETER_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Ejecutar pruebas JMeter
        run: |
          set -e
          mkdir -p results reports
          # Overrides opcionales (solo cuando el usuario los pasa en dispatch manual)
          ARGS=""
          [ -n "${{ github.event.inputs.threads }}" ]  && ARGS="$ARGS -Jthreads=${{ github.event.inputs.threads }}"
          [ -n "${{ github.event.inputs.rampup }}" ]   && ARGS="$ARGS -Jrampup=${{ github.event.inputs.rampup }}"
          [ -n "${{ github.event.inputs.duration }}" ] && ARGS="$ARGS -Jduration=${{ github.event.inputs.duration }}"
          [ -n "${{ github.event.inputs.think }}" ]    && ARGS="$ARGS -Jthink=${{ github.event.inputs.think }}"

          run_one () {
            local name="$1"
            echo "== Ejecutando escenario: $name =="
            rm -rf "reports/html-$name"
            jmeter -n -t "tests/$name.jmx" \
              -Jendpoints=config/pokeapi-endpoints.csv \
              $ARGS \
              -l "results/$name.jtl" \
              -e -o "reports/html-$name"
          }

          case "$SCENARIO" in
            smoke) run_one smoke ;;
            load)  run_one load ;;
            both)  run_one smoke; run_one load ;;
          esac

      - name: Calcular metricas
        run: |
          set -e
          METRICS=""
          for f in results/*.jtl; do
            [ -e "$f" ] || continue
            name=$(basename "$f" .jtl)
            python3 scripts/parse_results.py "$f" "$name" "reports/metrics-$name.json"
            METRICS="$METRICS reports/metrics-$name.json"
          done
          echo "METRICS=$METRICS" >> "$GITHUB_ENV"

      - name: Cargar histórico de corridas
        run: |
          # Descargar histórico del último commit (si existe)
          git show HEAD:reports/historical.json > reports/historical.json 2>/dev/null || echo "[]" > reports/historical.json
          cat reports/historical.json

      - name: Consolidar métricas
        run: |
          set -e
          # Si hay múltiples métricas, tomar la primera (consolidada)
          CONSOLIDATED=$(jq -s '.[0]' reports/metrics-*.json)
          echo "$CONSOLIDATED" > reports/metrics-consolidated.json
          echo "Métricas consolidadas"

      - name: Armar prompt para el agente principal
        run: |
          {
            echo "Analiza estos resultados de una prueba de performance JMeter contra PokeAPI."
            echo "SLOs de referencia: error < 1%, p95 < 800 ms."
            echo "Responde en espanol. La PRIMERA palabra debe ser exactamente PASS, WARN o FAIL."
            echo "Luego 2-4 puntos con hallazgos y recomendaciones concretas. Se breve."
            echo ""
            echo "=== METRICAS (JSON) ==="
            cat reports/metrics-consolidated.json
          } > prompt.txt
          cat prompt.txt

      - name: Validacion por agente de IA (GitHub Models)
        id: ai
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          prompt-file: prompt.txt
          max-tokens: 500
          system-prompt: "Eres un ingeniero de performance senior. Analizas metricas de carga y das un veredicto claro y accionable."

      - name: Consolidar veredicto (con fallback)
        env:
          AI_RESPONSE: ${{ steps.ai.outputs.response }}
        run: |
          set -e
          if [ -n "$AI_RESPONSE" ]; then
            printf '%s\n' "$AI_RESPONSE" > verdict.md
          else
            echo "Agente de IA no disponible; veredicto calculado por umbrales."
            # Fallback: PASS/WARN/FAIL a partir de error% y p95 max
            overall=$(jq '.overall // {}' reports/metrics-consolidated.json)
            err=$(echo "$overall" | jq '.error_pct // 0')
            p95=$(echo "$overall" | jq '.p95_ms // 0')
            level=PASS
            awk "BEGIN{exit !($err>1 || $p95>1500)}" && level=FAIL
            [ "$level" = "PASS" ] && awk "BEGIN{exit !($err>0.1 || $p95>800)}" && level=WARN
            printf '%s (fallback por umbrales)\n\n- Error maximo: %s%%\n- p95 maximo: %s ms\n' "$level" "$err" "$p95" > verdict.md
          fi
          cat verdict.md

      - name: "🔮 Generar prompt para Agente Predictivo Avanzado"
        run: |
          python3 scripts/generate_predictor_prompt.py \
            reports/metrics-consolidated.json \
            reports/historical.json \
            --output prompt-predictor.txt \
            --template prompts/prompt-predictor-template.txt
          echo "✅ Prompt predictivo generado"

      - name: "🔮 Análisis Predictivo Avanzado (IA)"
        id: predictor
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          prompt-file: prompt-predictor.txt
          max-tokens: 600
          system-prompt: |
            Eres un experto en análisis predictivo de performance y tendencias.
            Detectas patrones cíclicos, anomalías, y generas pronósticos.
            Tu análisis es riguroso y basado en datos.
            Responde en español. Sé conciso pero informativo.

      - name: "🔮 Procesar respuesta del Agente Predictivo"
        env:
          PREDICTOR_RESPONSE: ${{ steps.predictor.outputs.response }}
        run: |
          if [ -n "$PREDICTOR_RESPONSE" ]; then
            printf '%s\n' "$PREDICTOR_RESPONSE" > predictor-response.txt
            python3 scripts/process_predictor_response.py \
              predictor-response.txt \
              reports/metrics-consolidated.json \
              reports/historical.json \
              --output reports/analysis-predictor.md
            echo "✅ Análisis predictivo procesado"
            cat reports/analysis-predictor.md
          else
            echo "⚠️ Agente predictivo no disponible, continuando sin análisis avanzado"
            echo "# Análisis Predictivo (no disponible)" > reports/analysis-predictor.md
          fi

      - name: Generar reporte integrado
        run: |
          set -e
          STAMP=$(date -u +"%Y-%m-%d_%H%M")
          HUMAN=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          python3 scripts/gen_report_enhanced.py \
            --metrics reports/metrics-consolidated.json \
            --verdict verdict.md \
            --date "$HUMAN" \
            --run-url "$RUN_URL" \
            --historical reports/historical.json \
            --out "reports/report-${STAMP}.md"
          
          echo "REPORT=reports/report-${STAMP}.md" >> "$GITHUB_ENV"
          
          # Agregar análisis predictivo al resumen
          {
            echo "## 📊 Reporte de Performance PokeAPI"
            echo ""
            echo "### 🔮 Análisis Predictivo"
            cat reports/analysis-predictor.md
            echo ""
            echo "### 📈 Reporte Completo"
            cat "reports/report-${STAMP}.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Actualizar histórico de corridas
        run: |
          set -e
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Agregar corrida actual al histórico
          NEW_ENTRY=$(jq --arg ts "$TIMESTAMP" \
            '.overall.timestamp = $ts | .timestamp = $ts' \
            reports/metrics-consolidated.json)
          
          # Cargar histórico y agregar
          HISTORICAL=$(cat reports/historical.json)
          UPDATED=$(echo "$HISTORICAL" | jq --argjson entry "$NEW_ENTRY" '. += [$entry]')
          
          # Mantener solo últimas 30 corridas
          TRIMMED=$(echo "$UPDATED" | jq '.[-30:]')
          echo "$TRIMMED" > reports/historical.json
          
          echo "Histórico actualizado (últimas 30 corridas)"

      - name: Abrir issue si el performance degrada (WARN/FAIL)
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          SIMULAR: ${{ github.event.inputs.simular_fallo || 'no' }}
        run: |
          set -e
          # Nivel real: primera palabra del veredicto (PASS/WARN/FAIL)
          LEVEL=$(head -n1 verdict.md | awk '{print $1}' | tr -d '`*#')
          SIM_NOTE=""
          if [ "$SIMULAR" = "WARN" ] || [ "$SIMULAR" = "FAIL" ]; then
            LEVEL="$SIMULAR"
            SIM_NOTE="> NOTA: veredicto **simulado** manualmente para demostrar el cierre de ciclo.\n"
          fi
          echo "Nivel para decidir issue: $LEVEL"

          if [ "$LEVEL" != "WARN" ] && [ "$LEVEL" != "FAIL" ]; then
            echo "Veredicto $LEVEL: dentro de SLOs, no se abre issue."
            exit 0
          fi

          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            printf "%b" "$SIM_NOTE"
            echo "## Resultado de performance: $LEVEL"
            echo ""
            echo "La prueba de carga contra PokeAPI arrojo un veredicto **$LEVEL**."
            echo "SLOs de referencia: error < 1%, p95 < 800 ms."
            echo ""
            echo "- Fecha: $STAMP"
            echo "- Corrida: $RUN_URL"
            echo "- Reporte: \`${REPORT}\`"
            echo ""
            echo "### Veredicto del Agente IA Principal"
            echo ""
            cat verdict.md
            echo ""
            echo "### 🔮 Análisis Predictivo Avanzado"
            echo ""
            cat reports/analysis-predictor.md
            echo ""
            echo "### Métricas (JSON)"
            echo ""
            echo '```json'
            cat reports/metrics-consolidated.json
            echo '```'
            echo ""
            echo "_Issue abierto automaticamente por el workflow de performance._"
          } > issue_body.md

          # La etiqueta es opcional: si no se puede crear, se abre el issue sin ella
          gh label create performance --color FBCA04 --description "Hallazgos de pruebas de performance" --force >/dev/null 2>&1 || true
          gh issue create \
            --title "[$LEVEL] Performance PokeAPI degradado - $STAMP" \
            --body-file issue_body.md \
            --label performance \
          || gh issue create \
            --title "[$LEVEL] Performance PokeAPI degradado - $STAMP" \
            --body-file issue_body.md

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results
          path: |
            results/
            reports/
          retention-days: 14

      - name: Commitear reporte e histórico
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "perf-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/ README.md
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "Reporte de performance ${REPORT} + histórico + análisis predictivo [skip ci]"
            git push
          fi
